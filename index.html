    .nav-num { font-size: 10px; font-family: 'JetBrains Mono', monospace; color: #484f58; min-width: 20px; }

    .main-content { flex: 1; min-width: 0; overflow-y: auto; height: 100vh; }
    .content-inner { max-width: 760px; margin: 0 auto; padding: 40px 24px 80px; }

    .cmd-text { color: #58d4b2; font-size: 1.05em; font-weight: 600; }

    .flag-desc { color: #8b949e; font-size: 13px; font-family: 'Inter', sans-serif; }

    .exercise-card { background: #161b22; border: 1px solid #21262d; border-radius: 8px; padding: 16px; margin-bottom: 12px; }
    .exercise-num { width: 28px; height: 28px; border-radius: 50%; background: rgba(193,0,31,0.2); color: #c1001f; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
    .btn-hint { font-size: 12px; color: #e3b341; background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 4px 0; }
    .btn-answer { font-size: 12px; color: #c1001f; background: none; border: none; cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 4px 0; }
    .hint-box { margin-top: 8px; padding: 8px 12px; background: rgba(227,179,65,0.1); border: 1px solid rgba(227,179,65,0.2); border-radius: 6px; font-size: 13px; color: #e3b341; }
    .answer-box { margin-top: 8px; padding: 8px 12px; background: #0d1117; border: 1px solid #21262d; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #58d4b2; display: flex; align-items: center; gap: 8px; }

    .section-title { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; font-size: 17px; font-weight: 700; color: #e6edf3; }
    .tag-badge { font-size: 11px; background: rgba(193,0,31,0.15); color: #e8364f; padding: 2px 8px; border-radius: 9999px; font-weight: 600; }

    .hamburger { display: none; }
    .overlay { display: none; }

      .sidebar { position: fixed; left: 0; top: 0; z-index: 100; transform: translateX(-100%); transition: transform 0.2s; }

<script>
const MODULES = [
  {
    id:"linux-gnu", title:"O que é Linux e GNU", icon:"🐧", category:"Fundamentos Teóricos",
    description:"A história do Linux, o projeto GNU e o conceito de software livre",
    content:[
      "O Linux não é um sistema operacional completo — é um kernel (núcleo). O kernel faz a ponte entre o hardware (processador, memória, disco) e os programas. Ele gerencia processos, memória, dispositivos e chamadas de sistema.",
      "O kernel Linux foi criado por Linus Torvalds em 1991, como um projeto pessoal inspirado no MINIX. Publicado com licença GPL, permitindo que qualquer pessoa estudasse, modificasse e redistribuísse o código.",
      "O projeto GNU (GNU's Not Unix) foi iniciado por Richard Stallman em 1983 para criar um sistema operacional completamente livre. O GNU desenvolveu ferramentas essenciais: GCC, Emacs, Bash, coreutils (ls, cp, mv, rm, cat) e glibc.",
      "Quando o kernel Linux se uniu às ferramentas GNU, nasceu o sistema GNU/Linux — um sistema completo e livre. Por isso muitos puristas chamam de GNU/Linux. Na prática, a maioria diz simplesmente Linux.",
      "Software livre não significa gratuito. Significa liberdade: usar, estudar, modificar e distribuir. A GPL garante essas 4 liberdades fundamentais. O Debian é um dos maiores defensores dessas liberdades.",
      "Uma distribuição Linux é: kernel Linux + ferramentas GNU + gerenciador de pacotes + ambiente gráfico + configurações específicas. O Debian é uma das distribuições mais antigas e influentes do ecossistema.",
    ],
    commands:[
      {cmd:"uname -r", desc:"Exibe a versão do kernel Linux em uso", output:"6.1.0-21-amd64"},
      {cmd:"uname -a", desc:"Exibe todas as informações do sistema: kernel, hostname, arquitetura e data de compilação", output:"Linux debian 6.1.0-21-amd64 #1 SMP x86_64 GNU/Linux"},
      {cmd:"cat /proc/version", desc:"Mostra detalhes sobre o kernel e compilador usado na compilação"},
      {cmd:"cat /etc/os-release", desc:"Exibe informações sobre a distribuição Debian", output:'NAME="Debian GNU/Linux"\nVERSION="12 (bookworm)"'},
    ],
    exercises:[
      {q:"Qual é a diferença entre Linux e GNU/Linux?", hint:"Pense no que cada projeto contribui", ans:"Linux é apenas o kernel. GNU/Linux é o sistema completo: kernel Linux + ferramentas GNU"},
      {q:"Quem criou o kernel Linux e em que ano?", ans:"Linus Torvalds, em 1991"},
      {q:"Qual comando mostra a versão do kernel Debian?", ans:"uname -r"},
      {q:"Qual arquivo contém informações sobre a distribuição?", ans:"/etc/os-release"},
    ]
  },
  {
    id:"projeto-debian", title:"O Projeto Debian", icon:"🔴", category:"Fundamentos Teóricos",
    description:"Conheça o Debian, sua história, filosofia, Contrato Social e versões",
    content:[
      "O Debian é um sistema GNU/Linux criado por Ian Murdock em 1993. O nome Debian vem da combinação do nome Ian com o de sua então namorada Debra Lynn. É um dos projetos de software livre mais antigos do mundo.",
      "O Projeto Debian é administrado por voluntários ao redor do mundo e governado pelo Contrato Social — um compromisso público com a comunidade de software livre. Nunca financiado por uma empresa única.",
      "O Debian é a base de centenas de distribuições: Ubuntu, Linux Mint, Kali Linux, Raspberry Pi OS e muitas outras. Sua estabilidade e sistema de pacotes .deb são referências no mundo Linux.",
      "Três branches principais: Stable (estável, para produção), Testing (pacotes mais novos em teste) e Unstable/Sid (desenvolvimento). Para servidores, sempre use Stable.",
      "As versões recebem nomes de personagens do Toy Story: Buster (10), Bullseye (11), Bookworm (12 — atual), Trixie (13 — desenvolvimento). Suporte LTS de ~5 anos por versão.",
      "As Diretrizes de Software Livre do Debian (DFSG) definem o que é software livre para o projeto. Software que não atende vai para contrib ou non-free, mantendo o main 100% livre.",
    ],
    commands:[
      {cmd:"cat /etc/debian_version", desc:"Mostra a versão exata do Debian instalado", output:"12.5"},
      {cmd:"lsb_release -a", desc:"Exibe informações completas da distribuição", output:"Distributor ID: Debian\nDescription: Debian GNU/Linux 12 (bookworm)\nCodename: bookworm"},
      {cmd:"dpkg --version", desc:"Mostra a versão do gerenciador de pacotes dpkg"},
      {cmd:"apt-cache showpkg debian-archive-keyring", desc:"Mostra informações do pacote de chaves do Debian"},
    ],
    exercises:[
      {q:"Quem criou o Debian e em que ano?", ans:"Ian Murdock, em 1993"},
      {q:"Qual é a versão estável atual do Debian?", hint:"Personagem de Toy Story", ans:"Debian 12 (Bookworm)"},
      {q:"Qual comando mostra a versão do Debian?", ans:"cat /etc/debian_version ou lsb_release -a"},
      {q:"O que são as DFSG?", ans:"Diretrizes de Software Livre do Debian — definem o que é software livre para o projeto"},
    ]
  },
  {
    id:"repositorios", title:"Repositórios Debian", icon:"📚", category:"Fundamentos Teóricos",
    description:"Entenda os repositórios main, contrib, non-free e como configurar o sources.list",
    content:[
      "Os repositórios são servidores que armazenam pacotes. O arquivo /etc/apt/sources.list define quais repositórios o sistema consulta ao instalar ou atualizar pacotes.",
      "O repositório main contém apenas software livre conforme DFSG. O contrib contém software livre que depende de pacotes não-livres. O non-free contém software proprietário. O non-free-firmware (Debian 12+) tem firmwares proprietários.",
      "Além dos principais: security (atualizações de segurança), updates (atualizações estáveis) e backports (versões mais novas portadas para o Stable).",
      "Para o Debian 12 Bookworm, uma linha típica: deb https://deb.debian.org/debian bookworm main contrib non-free non-free-firmware. Adicione também as linhas de segurança e updates.",
      "Espelhos (mirrors) são cópias dos repositórios ao redor do mundo. Usar um próximo geograficamente acelera os downloads. No Brasil: ftp.br.debian.org ou espelhos da USP.",
    ],
    commands:[
      {cmd:"cat /etc/apt/sources.list", desc:"Exibe a lista de repositórios configurados"},
      {cmd:"apt-cache policy", desc:"Mostra os repositórios configurados e suas prioridades"},
      {cmd:"sudo apt-get update", desc:"Atualiza a lista de pacotes disponíveis nos repositórios"},
      {cmd:"apt-cache search nome", desc:"Busca pacotes nos repositórios pelo nome ou descrição", flags:[{f:"--names-only",d:"Busca apenas no nome do pacote"}]},

    ],
    exercises:[
      {q:"Qual arquivo define os repositórios do Debian?", ans:"/etc/apt/sources.list"},
      {q:"Qual repositório contém apenas software 100% livre?", ans:"main"},
      {q:"Qual comando atualiza a lista de pacotes?", ans:"sudo apt-get update"},
      {q:"Qual repositório tem firmwares proprietários no Debian 12?", ans:"non-free-firmware"},
    ]
  },
  {
    id:"instalacao", title:"Instalando o Debian", icon:"💿", category:"Instalação e Ambiente",
    description:"Como instalar o Debian: download, particionamento e configuração inicial",
    content:[
      "O Debian oferece: netinstall (baixa pacotes da internet), live ISO (testa antes de instalar) e DVD offline. Para a maioria, o netinstall é recomendado.",
      "O debian-installer suporta mais de 70 idiomas, incluindo português brasileiro, em modo gráfico ou texto (útil para servidores sem interface gráfica).",
      "Particionamento: /boot (500MB), raiz / (20GB+), /home (restante), swap (igual à RAM). Em UEFI, adicione partição EFI de 512MB (FAT32).",
      "Durante a instalação, você escolhe o ambiente gráfico: GNOME, KDE Plasma, XFCE, LXDE, MATE, Cinnamon. Para servidores, deixe sem ambiente gráfico.",
      "Após instalar, o GRUB é configurado como gerenciador de boot. O root não tem senha por padrão — use sudo com seu usuário regular para tarefas administrativas.",
    ],
    commands:[
      {cmd:"lsblk", desc:"Lista todos os discos e partições do sistema", output:"NAME   SIZE TYPE MOUNTPOINTS\nsda     20G disk\n├─sda1 512M part /boot/efi\n└─sda2  19G part /"},
      {cmd:"df -h", desc:"Mostra o uso de espaço em disco em formato legível", output:"Filesystem  Size  Used Avail Use%\n/dev/sda2    20G  4.2G   15G  23%"},
      {cmd:"sudo fdisk -l", desc:"Lista partições de todos os discos (requer root)"},
      {cmd:"free -h", desc:"Mostra uso de memória RAM e swap", output:"       total  used  free\nMem:     8Gi  1.2Gi 6.8Gi\nSwap:    4Gi    0B  4Gi"},
      {cmd:"hostnamectl", desc:"Mostra e configura o hostname do sistema", output:"Static hostname: debian\nOperating System: Debian GNU/Linux 12 (bookworm)"},
    ],
    exercises:[
      {q:"Qual comando lista todos os discos e partições?", ans:"lsblk"},
      {q:"Qual comando mostra o uso de espaço em disco legível?", ans:"df -h"},
      {q:"Qual tipo de partição é necessária em sistemas UEFI?", ans:"Partição EFI (FAT32), geralmente em /boot/efi"},
      {q:"Qual gerenciador de boot o Debian instala por padrão?", ans:"GRUB"},
    ]
  },
  {
    id:"ambiente-grafico", title:"Ambientes Gráficos", icon:"🖥️", category:"Instalação e Ambiente",
    description:"Conheça os ambientes gráficos disponíveis no Debian: GNOME, KDE, XFCE e outros",
    content:[
      "Um ambiente gráfico (DE) fornece janelas, menus, painéis e ícones. O Debian suporta múltiplos ambientes com características diferentes.",
      "GNOME é o ambiente padrão do Debian. Moderno e com foco em produtividade. Consome mais RAM mas é bem integrado. Usa GTK e o Mutter como compositor.",
      "KDE Plasma é o mais completo e customizável. Interface rica com muitos widgets. Consome RAM similar ao GNOME mas oferece muito mais controle visual. Usa Qt.",
      "XFCE é leve, rápido e estável — ideal para computadores antigos. Consome ~300MB de RAM e mantém aparência clássica de desktop.",
      "Outros: LXDE (ultratrailer), LXQt (LXDE moderno), MATE (fork GNOME 2), Cinnamon (focado em facilidade de uso).",
      "O display manager (GDM3 para GNOME, SDDM para KDE, LightDM para XFCE) é o programa de login. Você pode trocar o ambiente sem reinstalar o sistema.",
    ],
    commands:[
      {cmd:"sudo tasksel", desc:"Ferramenta para instalar grupos de pacotes (como ambientes gráficos)"},
      {cmd:"sudo apt install gnome-core", desc:"Instala o GNOME (versão mínima)"},
      {cmd:"sudo apt install kde-plasma-desktop", desc:"Instala o KDE Plasma"},
      {cmd:"sudo apt install xfce4", desc:"Instala o XFCE4"},
      {cmd:"sudo systemctl start gdm3", desc:"Inicia o display manager GDM3 do GNOME"},
      {cmd:"echo $XDG_CURRENT_DESKTOP", desc:"Mostra qual ambiente gráfico está em uso", output:"GNOME"},

    exercises:[
      {q:"Qual é o ambiente gráfico padrão do Debian?", ans:"GNOME"},
      {q:"Qual ambiente é mais recomendado para hardware antigo?", hint:"Pense em qual consome menos RAM", ans:"XFCE (ou LXDE para hardware muito antigo)"},
      {q:"Qual comando instala grupos de pacotes incluindo ambientes gráficos?", ans:"sudo tasksel"},
      {q:"Como verificar qual ambiente gráfico está ativo?", ans:"echo $XDG_CURRENT_DESKTOP"},
    ]
  },
  {
    id:"terminal", title:"Primeiros Passos no Terminal", icon:"⌨️", category:"Instalação e Ambiente",
    description:"Aprenda a usar o terminal Bash no Debian: navegação básica e comandos essenciais",
    content:[
      "O terminal é a interface de linha de comando. O Bash é o shell padrão do Debian. Abra com Ctrl+Alt+T no GNOME.",
      "O prompt mostra: usuário@hostname:diretório$. O cifrão $ indica usuário comum, # indica root. Nunca trabalhe como root no dia a dia.",
      "Autocompletar com Tab: parte do comando + Tab completa automaticamente. Tab duas vezes mostra todas as opções.",
      "Histórico: setas ↑ e ↓ navegam, Ctrl+R busca no histórico, ~/.bash_history armazena os comandos.",
      "Atalhos: Ctrl+C cancela, Ctrl+Z pausa, Ctrl+D fecha, Ctrl+L limpa a tela, Ctrl+A início da linha, Ctrl+E fim da linha.",

    commands:[

      {cmd:"ls -la", desc:"Lista arquivos e diretórios incluindo ocultos, em formato longo", flags:[{f:"-l",d:"Formato longo com permissões"},{f:"-a",d:"Mostra arquivos ocultos"},{f:"-h",d:"Tamanhos legíveis (KB, MB)"}]},
      {cmd:"cd /caminho", desc:"Muda de diretório", flags:[{f:"~",d:"Vai para o home"},{f:"..",d:"Volta um nível"},{f:"-",d:"Volta ao diretório anterior"}]},
      {cmd:"clear", desc:"Limpa o terminal (atalho: Ctrl+L)"},
      {cmd:"history | tail -20", desc:"Mostra os últimos 20 comandos do histórico"},
      {cmd:"whoami", desc:"Mostra o nome do usuário atual", output:"usuario"},
    ],
    exercises:[
      {q:"Qual comando mostra o diretório atual?", ans:"pwd"},
      {q:"Como listar todos os arquivos incluindo ocultos?", hint:"Pense nas flags de ls", ans:"ls -la"},
      {q:"Qual atalho cancela um processo em execução?", ans:"Ctrl+C"},
      {q:"Como voltar para o diretório home?", ans:"cd ~ ou apenas cd"},
    ]
  },
  {
    id:"navegacao", title:"Navegação no Sistema de Arquivos", icon:"📂", category:"Comandos Essenciais",
    description:"Entenda a hierarquia de diretórios do Debian e como navegar por ela",
    content:[
      "O Linux usa o FHS (Filesystem Hierarchy Standard). Tudo começa no / (raiz). Diferente do Windows com C: e D:, no Linux tudo está sob um único /.",
      "Diretórios: /bin e /usr/bin (executáveis), /etc (configurações), /home (usuários), /var (logs e dados variáveis), /tmp (temporários), /dev (dispositivos), /proc (kernel), /sys (sistema).",

      "Caminhos absolutos começam com / (ex: /home/user/arquivo). Caminhos relativos são relativos ao diretório atual. O ~ representa o home do usuário.",

    commands:[

      {q:"Qual comando busca um arquivo por nome recursivamente?", ans:"find / -name nome_do_arquivo"},

  {

    content:[
      "Os comandos básicos são simples mas poderosos. Diferente do Windows, o Linux não usa extensões para determinar o tipo — ele analisa o conteúdo.",
      "cp copia, mv move/renomeia, rm remove, mkdir cria diretórios, touch cria arquivos vazios ou atualiza timestamps.",
      "ATENÇÃO: Não existe lixeira no terminal. O rm apaga permanentemente. Confirme sempre o que está apagando antes de usar rm -rf.",
      "cat exibe conteúdo, less permite navegar em arquivos grandes (sair com q), head/tail mostram início/fim — tail -f monitora em tempo real.",

    ],
    commands:[
      {cmd:"cp arquivo.txt /backup/", desc:"Copia arquivo ou diretório", flags:[{f:"-r",d:"Recursivo (para diretórios)"},{f:"-p",d:"Preserva permissões e timestamps"},{f:"-v",d:"Modo verbose"}]},

// ────────────────────────────────────────────────────
// App Logic (plain JS + DOM manipulation)
// ────────────────────────────────────────────────────

let activeId = MODULES[0].id;
let expandedExercises = {};
let expandedHints = {};

function groupByCategory(modules) {
  const map = new Map();
  modules.forEach((m, i) => {
    if (!map.has(m.category)) map.set(m.category, []);
    map.get(m.category).push({ ...m, globalIndex: i });
  });
  return map;
}

function renderSidebar() {
  const grouped = groupByCategory(MODULES);
  let html = '';
  grouped.forEach((items, category) => {
    html += `<div class="nav-category">${category}</div>`;
    items.forEach(m => {
      const active = m.id === activeId ? 'active' : '';
      html += `<button class="nav-item ${active}" onclick="selectModule('${m.id}')">
        <span>${m.icon}</span>
        <span class="nav-num">${String(m.globalIndex + 1).padStart(2, '0')}</span>
        <span style="line-height:1.3;text-align:left;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.title}</span>
      </button>`;
    });
  });
  document.getElementById('nav').innerHTML = html;
}

function renderContent() {
  const idx = MODULES.findIndex(m => m.id === activeId);
  const m = MODULES[idx];
  const prev = idx > 0 ? MODULES[idx-1] : null;
  const next = idx < MODULES.length-1 ? MODULES[idx+1] : null;

  let cmdsHtml = m.commands.map((c,ci) => `
    <div class="cmd-block fade-in">
      <div class="cmd-label">Comando</div>
      <code class="cmd-text"><span class="cmd-prompt">$ </span>${escHtml(c.cmd)}</code>
      <p class="cmd-desc">${escHtml(c.desc)}</p>
      ${c.flags && c.flags.length ? `<div style="margin-top:12px;padding-top:12px;border-top:1px solid #21262d">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:#484f58;margin-bottom:6px">Flags / Opções:</div>
        ${c.flags.map(f=>`<div class="flag-item"><code class="flag-name">${escHtml(f.f)}</code><span class="flag-desc">${escHtml(f.d)}</span></div>`).join('')}
      </div>` : ''}
      ${c.output ? `<div class="cmd-example">
        <div class="cmd-example-label">Saída:</div>
        <pre class="cmd-output" style="margin-top:4px;white-space:pre-wrap">${escHtml(c.output)}</pre>
      </div>` : ''}
    </div>
  `).join('');

  let exsHtml = m.exercises.map((e,ei) => {
    const key = m.id+'-'+ei;
    const showAns = expandedExercises[key];
    const showHint = expandedHints[key];
    return `<div class="exercise-card fade-in">
      <div style="display:flex;gap:12px;align-items:flex-start">
        <div class="exercise-num">${ei+1}</div>
        <div style="flex:1">
          <p style="margin:0;color:#e6edf3;font-weight:500;line-height:1.6">${escHtml(e.q)}</p>
          <div style="display:flex;gap:12px;margin-top:10px;flex-wrap:wrap">
            ${e.hint ? `<button class="btn-hint" onclick="toggleHint('${key}')">💡 ${showHint ? 'Esconder dica' : 'Ver dica'}</button>` : ''}
            <button class="btn-answer" onclick="toggleAnswer('${key}')">
              ${showAns ? '▼ Esconder resposta' : '▶ Ver resposta'}
            </button>
          </div>
          ${showHint && e.hint ? `<div class="hint-box">${escHtml(e.hint)}</div>` : ''}
          ${showAns ? `<div class="answer-box"><span style="color:#3d8b66;font-size:14px">✓</span>${escHtml(e.ans)}</div>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `<div class="content-inner fade-in">
    <div style="margin-bottom:32px">
      <div style="display:flex;gap:8px;align-items:center;font-size:12px;color:#8b949e;font-family:'JetBrains Mono',monospace;margin-bottom:6px">
        <span style="text-transform:uppercase;letter-spacing:.1em">${escHtml(m.category)}</span>
        <span>•</span>
        <span>Módulo ${String(idx+1).padStart(2,'0')} de ${String(MODULES.length).padStart(2,'0')}</span>
      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
        <span style="font-size:2rem">${m.icon}</span>
        <h1 style="margin:0;font-size:clamp(1.5rem,4vw,2rem);font-weight:800;color:#e6edf3;line-height:1.2">${escHtml(m.title)}</h1>
      </div>
      <p style="margin:0;color:#8b949e;font-size:16px;line-height:1.6">${escHtml(m.description)}</p>
    </div>

    <section style="margin-bottom:40px">
      <div class="section-title">
        <span style="color:#c1001f">📖</span>
        <span>Conceitos</span>
      </div>
      ${m.content.map(p=>`<p style="color:#8b949e;line-height:1.8;margin:0 0 16px;font-size:15px">${escHtml(p)}</p>`).join('')}
    </section>

    <section style="margin-bottom:40px">
      <div class="section-title">
        <span style="color:#58d4b2">💻</span>
        <span>Comandos</span>
        <span class="tag-badge">${m.commands.length}</span>
      </div>
      ${cmdsHtml}
    </section>

    <section style="margin-bottom:40px">
      <div class="section-title">
        <span style="color:#e3b341">🎓</span>
        <span>Exercícios</span>
        <span class="tag-badge">${m.exercises.length}</span>
      </div>
      <p style="color:#484f58;font-size:13px;margin:0 0 16px">Tente responder antes de ver a resposta! Pratique no terminal para fixar o conteúdo.</p>
      ${exsHtml}
    </section>

    <div style="display:flex;justify-content:space-between;align-items:center;padding-top:24px;border-top:1px solid #21262d">
      <button onclick="${prev ? `selectModule('${prev.id}')` : ''}" 
        style="display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;color:${prev ? '#8b949e' : '#2d333b'};background:none;border:none;cursor:${prev ? 'pointer' : 'default'};padding:0"
        ${!prev ? 'disabled' : ''}>
        ◀ Anterior
      </button>
      <button onclick="${next ? `selectModule('${next.id}')` : ''}"
        style="display:flex;align-items:center;gap:8px;font-size:14px;font-weight:500;color:${next ? '#c1001f' : '#2d333b'};background:none;border:none;cursor:${next ? 'pointer' : 'default'};padding:0"
        ${!next ? 'disabled' : ''}>
        Próximo ▶
      </button>
    </div>
  </div>`;

  document.getElementById('content').scrollTop = 0;
}

function escHtml(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function selectModule(id) {
  activeId = id;
  expandedExercises = {};
  expandedHints = {};
  renderSidebar();
  renderContent();
  closeSidebar();
}

function toggleAnswer(key) {
  expandedExercises[key] = !expandedExercises[key];
  renderContent();
}

function toggleHint(key) {
  expandedHints[key] = !expandedHints[key];
  renderContent();
}

function openSidebar() {
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('overlay').classList.add('show');
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('show');
}

// ── Build DOM ──
document.getElementById('root').innerHTML = `
  <div style="display:flex;height:100vh;overflow:hidden">
    <div id="overlay" class="overlay" onclick="closeSidebar()"></div>

    <div id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div style="display:flex;align-items:center;gap:10px">
          <div class="logo">D</div>
          <div>
            <div style="font-size:13px;font-weight:700;color:#e6edf3;line-height:1.2">Debian</div>
            <div style="font-size:11px;color:#8b949e">Guia Completo</div>
          </div>
        </div>
      </div>
      <nav id="nav" style="padding:8px 0"></nav>
      <div style="padding:12px 16px;border-top:1px solid #21262d">
        <div style="font-size:10px;color:#484f58;text-align:center">Debian — Guia Completo v1.0 • PT-BR</div>
      </div>
    </div>

    <div style="flex:1;min-width:0;display:flex;flex-direction:column">
      <div style="display:flex;align-items:center;padding:12px 16px;background:#0d1117;border-bottom:1px solid #21262d;position:sticky;top:0;z-index:10" class="hamburger">
        <button onclick="openSidebar()" style="background:none;border:none;color:#e6edf3;cursor:pointer;padding:4px;display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:6px;border:1px solid #30363d">
          ☰
        </button>
        <span style="margin-left:12px;font-size:14px;font-weight:600;color:#e6edf3">Debian — Guia Completo</span>
      </div>
      <div id="content" style="flex:1;overflow-y:auto"></div>
    </div>
  </div>
`;

renderSidebar();
renderContent();
</script>
</body>
</html>
